<!DOCTYPE html>
<html>
<head>
<title>MindTrace | Profile</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#a8edea,#d6f6ff,#c9d6ff,#e4c1f9);
background-size:400% 400%;
animation:bgMove 18s ease infinite;

display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:420px;
background:rgba(255,255,255,.9);
backdrop-filter:blur(15px);
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 25px 60px rgba(0,0,0,.08);
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
background:linear-gradient(135deg,#38bdf8,#6366f1,#22c55e);
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
color:white;
margin:auto;
margin-bottom:20px;
}

h2{
color:#2563eb;
margin-bottom:5px;
}

.info{
margin-top:20px;
text-align:left;
}

.row{
margin-bottom:12px;
}

label{
font-weight:600;
}

button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:40px;
background:linear-gradient(135deg,#38bdf8,#6366f1,#22c55e);
color:white;
cursor:pointer;
}

/* RESULTS HIDDEN INITIALLY */
#resultsList{
display:none;
margin-top:20px;
}

</style>
</head>

<body>

<div class="card">

<div class="avatar">👤</div>

<h2 id="username"></h2>
<p>Mental Wellness Member</p>

<div class="info">

<div class="row">
<label>Account Created:</label>
<span id="created"></span>
</div>

<div class="row">
<label>Total Assessments:</label>
<span id="tests"></span>
</div>

</div>

<!-- ✅ BUTTON TO SHOW RESULTS -->
<button onclick="toggleResults()">View My Results</button>

<!-- ✅ RESULTS (hidden until clicked) -->
<div id="resultsList"></div>

<button onclick="window.location.href='/'">
Back to Dashboard
</button>

</div>

<script>

const user = JSON.parse(localStorage.getItem("mindtrace_user")) || {username:"Guest",created:"Today"}

document.getElementById("username").innerText = user.username
document.getElementById("created").innerText = user.created

let storedResults = []

fetch("/api/get-user-results")
.then(res => res.json())
.then(data => {
    storedResults = data;
    document.getElementById("tests").innerText = data.length;
});

function toggleResults(){

let container = document.getElementById("resultsList");

if(container.style.display === "block"){
    container.style.display = "none";
    return;
}

container.style.display = "block";
container.innerHTML = "";

if(storedResults.length === 0){
    container.innerHTML = "<p>No results yet</p>";
    return;
}

storedResults.forEach(r => {
    container.innerHTML += `
        <div style="
            margin-top:10px;
            padding:12px;
            border-radius:12px;
            background:#f3f4f6;
            text-align:left;
        ">
            <strong>${r.test_name}</strong><br>
            Score: ${r.score}<br>
            Severity: ${r.severity}
        </div>
    `;
});

}

</script>

</body>
</html>
