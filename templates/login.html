
<!DOCTYPE html>
<html>
<head>
<title>MindTrace | Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#a8edea,#d6f6ff,#c9d6ff,#e4c1f9);
background-size:400% 400%;
animation:bgMove 18s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:100%;
max-width:420px;
padding:20px;
}

.login-card{
background:rgba(255,255,255,.75);
backdrop-filter:blur(18px);
border-radius:26px;
padding:50px 40px;
box-shadow:0 20px 50px rgba(0,0,0,.1);
text-align:center;
}

.logo{
font-size:26px;
font-weight:600;
color:#2563eb;
margin-bottom:10px;
}

.subtitle{
font-size:14px;
color:#555;
margin-bottom:30px;
}

.input-group{
position:relative;
margin-bottom:18px;
}

.input-group span{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
font-size:16px;
opacity:.6;
}

.input-group input{
width:100%;
padding:14px 14px 14px 40px;
border-radius:12px;
border:1px solid #e5e7eb;
outline:none;
font-size:14px;
}

.input-group input:focus{
border-color:#6366f1;
}

button{
width:100%;
padding:14px;
border-radius:30px;
border:none;
background:linear-gradient(135deg,#38bdf8,#6366f1,#22c55e);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.link{
margin-top:18px;
font-size:14px;
color:#2563eb;
cursor:pointer;
}

.link:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<div class="login-card">

<div class="logo">MindTrace</div>
<div class="subtitle">Sign in to continue</div>

<form action="/login-user" method="POST">

<div class="input-group">
<span>👤</span>
<input type="email" name="email" placeholder="Email" required>
</div>

<div class="input-group">
<span>🔒</span>
<input type="password" name="password" placeholder="Password" required>
</div>

<button type="submit">Login</button>

</form>

<div class="link" onclick="window.location.href='/register'">
Create an account
</div>

</div>

</div>

</body>
</html>
