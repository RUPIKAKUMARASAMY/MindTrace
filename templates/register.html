
<!DOCTYPE html>
<html>
<head>
<title>MindTrace | Register</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#a8edea,#d6f6ff,#c9d6ff,#e4c1f9);
background-size:400% 400%;
animation:bgMove 18s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.login-wrapper{
width:100%;
display:flex;
justify-content:center;
}

.login-card{
width:380px;
padding:45px;
border-radius:26px;
background:rgba(255,255,255,.85);
backdrop-filter:blur(18px);
box-shadow:0 25px 60px rgba(0,0,0,.08);
text-align:center;
}

.logo{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:10px;
}

.logo-icon{
width:60px;
height:60px;
border-radius:50%;
background:linear-gradient(135deg,#38bdf8,#6366f1,#22c55e);
margin-bottom:10px;
}

.logo h1{
color:#2563eb;
font-weight:600;
}

.subtitle{
font-size:14px;
color:#666;
margin-bottom:30px;
}

input{
width:100%;
padding:14px;
margin-bottom:18px;
border-radius:12px;
border:1px solid #e5e7eb;
outline:none;
font-size:14px;
}

input:focus{
border-color:#6366f1;
}

button{
width:100%;
padding:14px;
border-radius:24px;
border:none;
background:linear-gradient(135deg,#38bdf8,#6366f1,#22c55e);
color:white;
font-weight:600;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
}

.link{
margin-top:20px;
font-size:13px;
color:#666;
}

.link a{
color:#2563eb;
text-decoration:none;
font-weight:600;
}

.link a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="login-wrapper">

<div class="login-card">

<div class="logo">
<div class="logo-icon"></div>
<h1>MindTrace</h1>
</div>

<p class="subtitle">
Create your personal wellness account
</p>

<form action="/register-user" method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">
Create Account
</button>

</form>

<p class="link">
Already have an account?
<a href="/login">Sign In</a>
</p>

</div>

</div>

</body>
</html>
```
